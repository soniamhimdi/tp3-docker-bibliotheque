services:

  database:
    image: mongo:7
    container_name: bibliotheque_db_prod
    restart: always
    volumes:
      - database_data:/data/db
    networks:
      - bibliotheque_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bibliotheque_api_prod
    restart: always
    environment:
      PORT: 5000
      MONGO_URL: mongodb://database:27017/bibliotheque
      NODE_ENV: production
    command: ["node", "server.js"]
    depends_on:
      - database
    networks:
      - bibliotheque_network

  nginx:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: bibliotheque_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - bibliotheque_network

volumes:
  database_data:

networks:
  bibliotheque_network:
    driver: bridge